    .message-board{max-width:800px;margin:0 auto;padding:0.3rem}.message-input-area{background:rgba(255,250,245,0.9);border-radius:1.5rem;padding:1rem;margin-bottom:1.2rem;box-shadow:var(--shadow);border:1px solid #f0e1cf}.message-textarea{width:100%;padding:0.7rem 0.9rem;border-radius:1.2rem;border:1px solid #dac29e;font-size:0.85rem;background:#fffdf9;resize:vertical;font-family:inherit;min-height:55px;margin-bottom:0.6rem}.message-submit-btn{background:linear-gradient(135deg,var(--accent),#8b6f4e);color:#fff;padding:0.55rem 1.8rem;border-radius:3rem;border:none;font-size:0.85rem;font-weight:600;cursor:pointer;letter-spacing:1px;display:flex;align-items:center;gap:0.35rem;margin:0 auto}.message-list{display:flex;flex-direction:column;gap:0.6rem}.message-item{background:rgba(255,250,245,0.9);border-radius:1.2rem;padding:0.8rem 1rem;box-shadow:0 5px 12px rgba(80,60,30,0.05);border:1px solid #f0e1cf}.message-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.3rem;flex-wrap:wrap;gap:0.2rem}.message-time{font-size:0.7rem;color:var(--accent);display:flex;align-items:center;gap:0.2rem}.message-content{color:#5d4d3a;line-height:1.5;white-space:pre-wrap;word-break:break-word;font-size:0.85rem}.message-actions{display:flex;gap:0.3rem;align-items:center}.message-reply-btn{background:transparent;border:1px solid #c9b392;color:var(--accent);cursor:pointer;font-size:0.65rem;padding:0.15rem 0.45rem;border-radius:1rem;display:flex;align-items:center;gap:0.15rem}.message-delete-btn{background:transparent;border:none;color:#c9b392;cursor:pointer;font-size:0.65rem;padding:0.15rem 0.35rem;border-radius:1rem}.replies-section{margin-top:0.5rem;border-top:1px solid #f0e1cf;padding-top:0.5rem}.reply-item{background:#fdf8f2;border-radius:0.7rem;padding:0.35rem 0.6rem;margin-bottom:0.3rem;font-size:0.75rem}.reply-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.15rem}.reply-time{font-size:0.6rem;color:#c9b392}.reply-cont <body>
<div class="welcome-screen" id="welcomeScreen"><div class="welcome-box"><div class="welcome-line" id="welcomeLine1">欢迎来到我们的故事</div><div class="welcome-line sub" id="welcomeLine2">还记得我们的初次见面吗</div><div class="welcome-line sub" id="welcomeLine3">记得的话，下面的问题就难不倒你哦</div><div class="welcome-dots" id="welcomeDots"><div class="welcome-dot"></div><div class="welcome-dot"></div><div class="welcome-dot"></div></div></div></div>
<div class="lock-screen hidden" id="lockScreen"><div class="lock-box"><div class="lock-icon"><i class="fas fa-heart"></i></div><h2>我们的回忆</h2><p>请输入密码以访问此网站</p><input type="password" class="lock-input" id="lockPasswordInput" placeholder="输入访问密码" maxlength="20" inputmode="numeric"><button class="lock-btn" id="unlockBtn"><i class="fas fa-unlock-alt"></i> 解锁进入</button><div class="lock-error" id="lockError">密码错误，请重试</div></div></div>
<div class="media-viewer" id="mediaViewer"><div class="viewer-title" id="viewerTitle" style="position:absolute;top:1.5rem;left:1.5rem;color:#fff;font-size:0.85rem;background:rgba(0,0,0,0.5);padding:0.25rem 0.8rem;border-radius:2rem;z-index:10;max-width:50%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></div><button class="close-viewer" id="closeViewer"><i class="fas fa-times"></i></button><button class="viewer-nav viewer-prev" id="viewerPrev"><i class="fas fa-chevron-left"></i></button><div class="viewer-content" id="viewerContent"></div><button class="viewer-nav viewer-next" id="viewerNext"><i class="fas fa-chevron-right"></i></button><div class="viewer-counter" id="viewerCounter">1 / 1</div></div>
<div class="app-container"><div class="site-header"><div class="site-title">我们的回忆</div></div><div class="main-nav"><button class="nav-btn active" id="navGallery"><i class="fas fa-images"></i> 画廊</button><button class="nav-btn" id="navMessage"><i class="fas fa-comment-dots"></i> 留言板</button><button class="nav-btn" id="navMailbox"><i class="fas fa-envelope"></i> 信箱</button></div><div class="page active" id="pageGallery"><div class="tabs"><button class="tab-btn active" id="tabPhotos"><i class="fas fa-camera"></i> 照片/动图</button><button class="tab-btn" id="tabVideos"><i class="fas fa-video"></i> 视频</button></div>
<div class="progress-bar-wrap" id="progressBarWrap"><div class="progress-bar-fill" id="progressBarFill"></div></div><div class="upload-status" id="uploadStatus"></div>
<div class="media-grid-wrapper"><div class="media-grid active" id="mediaGridPhotos"></div><div class="media-grid" id="mediaGridVideos"></div></div><div class="upload-area"><label class="upload-label" for="fileInput"><i class="fas fa-cloud-upload-alt"></i> 上传</label><input type="file" id="fileInput" accept="image/*,image/gif,video/*,.mp4,.webm,.ogg,.mov,.avi,.mkv,.flv,.wmv,.m4v,.3gp,.ts,.mts,.m2ts" multiple><div class="batch-actions"><button class="batch-delete-btn" id="batchDeleteBtn"><i class="fas fa-check-square"></i> 批量删除</button><button class="select-all-btn" id="selectAllBtn"><i class="fas fa-check-double"></i> 全选</button><button class="confirm-delete-btn" id="confirmDeleteBtn"><i class="fas fa-trash-alt"></i> 删除(<span id="selectedCount">0</span>)</button><button class="cancel-select-btn" id="cancelSelectBtn"><i class="fas fa-times"></i> 取消</button></div></div></div><div class="page" id="pageMessage"><div class="message-board"><div class="message-input-area"><textarea class="message-textarea" id="messageContentInput" placeholder="写下你想说的话..." rows="3" maxlength="500"></textarea><button class="message-submit-btn" id="messageSubmitBtn"><i class="fas fa-paper-plane"></i> 发送留言</button></div><div class="message-count" id="messageCount">共 0 条留言</div><div class="message-list" id="messageList"><div class="message-empty"><i class="fas fa-comments"></i><p>还没有留言，来说点什么吧~</p></div></div></div></div><div class="page" id="pageMailbox"><div class="mailbox-grid"><div class="mailbox-card"><div class="mailbox-icon"><i class="fas fa-bed"></i></div><h3>1号床</h3><p>密码提示：Star张的Debut Day</p><div class="letter-content encrypted" id="letterContent1">🔒 输入密码查看信件</div><button class="btn btn-primary" onclick="openLetter(1)"><i class="fas fa-lock-open"></i> 打开信箱</button></div><div class="mailbox-card"><div class="mailbox-icon"><i class="fas fa-bed"></i></div><h3>3号床</h3><p>密码提示：你的签名</p><div class="letter-content encrypted" id="letterContent2">🔒 输入密码查看信件</div><button class="btn btn-primary" onclick="openLetter(2)"><i class="fas fa-lock-open"></i> 打开信箱</button></div><div class="mailbox-card"><div class="mailbox-icon"><i class="fas fa-bed"></i></div><h3>4号床</h3><p>密码提示：Silence的专属时间</p><div class="letter-content encrypted" id="letterContent3">🔒 输入密码查看信件</div><button class="btn btn-primary" onclick="openLetter(3)"><i class="fas fa-lock-open"></i> 打开信箱</button></div><div class="mailbox-card"><div class="mailbox-icon"><i class="fas fa-home"></i></div><h3>107</h3><p>密码提示：专属数字</p><div class="letter-content encrypted" id="letterContent4">🔒 输入密码查看信件</div><button class="btn btn-primary" onclick="openLetter(4)"><i class="fas fa-lock-open"></i> 打开信箱</button></div></div></div></div>
<div class="modal" id="textModal"><div class="modal-content"><h3><i class="fas fa-pen-fancy"></i> 编辑文字</h3><textarea id="mediaTextInput" rows="3" placeholder="输入你想显示在媒体下方的文字..."></textarea><div class="modal-actions"><button class="btn btn-secondary" id="cancelTextBtn">取消</button><button class="btn btn-primary" id="saveTextBtn">保存文字</button></div></div></div>
<div class="modal" id="passwordModal"><div class="modal-content"><h3><i class="fas fa-lock"></i> 输入密码</h3><input type="password" class="password-input" id="passwordInput" placeholder="请输入密码..."><div class="modal-actions"><button class="btn btn-secondary" id="cancelPasswordBtn">取消</button><button class="btn btn-primary" id="confirmPasswordBtn">确认</button></div></div></div>
<div class="modal" id="letterModal"><div class="modal-content"><h3><i class="fas fa-pen-fancy"></i> 编辑信件</h3><textarea id="letterTextInput" rows="6" placeholder="写下你想说的话..."></textarea><div class="modal-actions"><button class="btn btn-secondary" id="cancelLetterBtn">取消</button><button class="btn btn-primary" id="saveLetterBtn">保存信件</button></div></div></div>

<script>
(function(){
const SITE_PASSWORD='20240906';
const DB_NAME='OurMemoriesDB';
const DB_VERSION=1;
const META_KEY='OurMemoriesMeta';

function openDB(){
  return new Promise((resolve,reject)=>{
    const r=indexedDB.open(DB_NAME,DB_VERSION);
    r.onupgradeneeded=(e)=>{const db=e.target.result;if(!db.objectStoreNames.contains('files'))db.createObjectStore('files',{keyPath:'id'});};
    r.onsuccess=e=>resolve(e.target.result);r.onerror=e=>reject(e.target.error);
  });
}

async function saveFile(id,blob){const db=await openDB();return new Promise((r)=>{const tx=db.transaction('files','readwrite');tx.objectStore('files').put({id,blob});tx.oncomplete=()=>{db.close();r()}})}
async function loadFile(id){const db=await openDB();return new Promise((r)=>{const tx=db.transaction('files','readonly');const req=tx.objectStore('files').get(id);req.onsuccess=()=>{db.close();r(req.result?req.result.blob:null)}})}
async function deleteFiles(ids){const db=await openDB();return new Promise((r)=>{const tx=db.transaction('files','readwrite');const s=tx.objectStore('files');for(const id of Array.from(ids)){try{s.delete(id)}catch(e){}}tx.oncomplete=()=>{db.close();r()}})}

function saveMeta(meta){localStorage.setItem(META_KEY,JSON.stringify(meta))}
function loadMeta(){try{return JSON.parse(localStorage.getItem(META_KEY)||'[]')}catch(e){return[]}}
function saveMsgs(msgs){localStorage.setItem('OurMemoriesMsgs',JSON.stringify(msgs))}
function loadMsgs(){try{return JSON.parse(localStorage.getItem('OurMemoriesMsgs')||'[]')}catch(e){return[]}}
function saveLettersData(letters){localStorage.setItem('OurMemoriesLetters',JSON.stringify(letters))}
function loadLettersData(){try{return JSON.parse(localStorage.getItem('OurMemoriesLetters')||'{"1":"","2":"","3":"","4":""}')}catch(e){return{1:'',2:'',3:'',4:''}}}

const LD1=0,LD2=3500,LD3=7000,DD=10500,TD=14000;
const ws=document.getElementById('welcomeScreen'),wl1=document.getElementById('welcomeLine1'),wl2=document.getElementById('welcomeLine2'),wl3=document.getElementById('welcomeLine3'),wd=document.getElementById('welcomeDots');
const ls=document.getElementById('lockScreen'),lpi=document.getElementById('lockPasswordInput'),ub=document.getElementById('unlockBtn'),le=document.getElementById('lockError');
setTimeout(()=>wl1.classList.add('show'),LD1);setTimeout(()=>wl2.classList.add('show'),LD2);setTimeout(()=>wl3.classList.add('show'),LD3);setTimeout(()=>wd.classList.add('show'),DD);setTimeout(()=>{ws.classList.add('hidden');ls.classList.remove('hidden');lpi.focus()},TD);
function tryUnlock(){if(lpi.value.trim()===SITE_PASSWORD){ls.classList.add('hidden');initApp()}else{le.classList.add('show');lpi.value='';lpi.focus();setTimeout(()=>le.classList.remove('show'),1500)}}
ub.addEventListener('click',tryUnlock);lpi.addEventListener('keydown',e=>{if(e.key==='Enter')tryUnlock()});

async function initApp(){
  let mediaMeta=loadMeta(),messages=loadMsgs(),letters=loadLettersData();
  let selectedItems=new Set(),isSelectMode=false,currentFilter='photos',currentEditItemId=null;
  const gridPhotos=document.getElementById('mediaGridPhotos'),gridVideos=document.getElementById('mediaGridVideos');
  const fileInput=document.getElementById('fileInput'),tabPhotos=document.getElementById('tabPhotos'),tabVideos=document.getElementById('tabVideos');
  const textModal=document.getElementById('textModal'),mediaTextInput=document.getElementById('mediaTextInput');
  const saveTextBtn=document.getElementById('saveTextBtn'),cancelTextBtn=document.getElementById('cancelTextBtn');
  const batchDeleteBtn=document.getElementById('batchDeleteBtn'),confirmDeleteBtn=document.getElementById('confirmDeleteBtn'),cancelSelectBtn=document.getElementById('cancelSelectBtn'),selectedCountSpan=document.getElementById('selectedCount'),selectAllBtn=document.getElementById('selectAllBtn');
  const mediaViewer=document.getElementById('mediaViewer'),viewerContent=document.getElementById('viewerContent'),viewerTitle=document.getElementById('viewerTitle'),closeViewer=document.getElementById('closeViewer'),viewerPrev=document.getElementById('viewerPrev'),viewerNext=document.getElementById('viewerNext'),viewerCounter=document.getElementById('viewerCounter');
  const progressBarWrap=document.getElementById('progressBarWrap'),progressBarFill=document.getElementById('progressBarFill'),uploadStatus=document.getElementById('uploadStatus');
  let currentViewerIndex=0,currentViewerItems=[],currentVideoElement=null,renderPending=false;
  const urlCache=new Map();

  function showToast(m,del){const t=document.createElement('div');t.className=del?'delete-toast':'save-success';t.textContent=m||'✅';document.body.appendChild(t);setTimeout(()=>t.remove(),1000)}
  function getItems(filter){return filter==='photos'?mediaMeta.filter(i=>i.type==='image'):filter==='videos'?mediaMeta.filter(i=>i.type==='video'):mediaMeta}
  function typeLabel(item){return item.type==='video'?'视频':'照片'}
  function typeIcon(item){return item.type==='video'?'fa-video':'fa-image'}
  function isVideoFile(file){return file.type.startsWith('video/')||file.name.match(/\.(mp4|webm|ogg|mov|avi|mkv|flv|wmv|m4v|3gp|ts|mts|m2ts)$/i)}
  function esc(t){return String(t).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[m])}

  async function getMediaURL(id){if(urlCache.has(id))return urlCache.get(id);const blob=await loadFile(id);if(blob){const url=URL.createObjectURL(blob);urlCache.set(id,url);return url}return '';}

  async function buildPhotosHTML(){
    const items=getItems('photos');if(!items.length){gridPhotos.innerHTML='<div class="empty-state"><i class="far fa-images" style="font-size:2rem;display:block;margin-bottom:0.5rem;"></i>暂无照片</div>';return}
    let h='';for(const item of items){const url=await getMediaURL(item.id);const tc=item.text||'',tl=typeLabel(item),ti=typeIcon(item),sel=selectedItems.has(item.id),smc=isSelectMode?' select-mode':'',sc=sel?' selected':'';h+=`<div class="media-card${smc}${sc}" data-id="${item.id}"><div class="select-checkbox"><i class="fas fa-check"></i></div><div class="media-container"><img src="${url}" alt="${esc(item.title)}" loading="lazy"></div><div class="media-text-below ${tc?'':'empty'}">${tc?esc(tc):'点击编辑'}</div><div class="card-footer"><span class="media-title"><i class="fas ${ti}"></i> ${esc(item.title)||'媒体'}<span class="media-type-badge">${tl}</span></span><div class="action-btns"><button class="icon-btn text-edit-btn" title="编辑"><i class="fas fa-pen"></i></button><button class="icon-btn preview-btn" title="查看"><i class="fas fa-search-plus"></i></button><button class="icon-btn single-delete-btn" title="删除"><i class="fas fa-trash-alt"></i></button></div></div></div>`;}gridPhotos.innerHTML=h;
  }

  async function buildVideosHTML(){
    const items=getItems('videos');if(!items.length){gridVideos.innerHTML='<div class="empty-state"><i class="fas fa-video" style="font-size:2rem;display:block;margin-bottom:0.5rem;"></i>暂无视频</div>';return}
    let h='';for(const item of items){const url=await getMediaURL(item.id);const tc=item.text||'',tl=typeLabel(item),ti=typeIcon(item),sel=selectedItems.has(item.id),smc=isSelectMode?' select-mode':'',sc=sel?' selected':'';h+=`<div class="media-card${smc}${sc}" data-id="${item.id}"><div class="select-checkbox"><i class="fas fa-check"></i></div><div class="media-container"><video src="${url}" loop preload="metadata" playsinline muted></video><div class="play-icon"><i class="fas fa-play"></i></div></div><div class="media-text-below ${tc?'':'empty'}">${tc?esc(tc):'点击编辑'}</div><div class="card-footer"><span class="media-title"><i class="fas ${ti}"></i> ${esc(item.title)||'视频'}<span class="media-type-badge">${tl}</span></span><div class="action-btns"><button class="icon-btn text-edit-btn" title="编辑"><i class="fas fa-pen"></i></button><button class="icon-btn preview-btn" title="查看"><i class="fas fa-expand"></i></button><button class="icon-btn single-delete-btn" title="删除"><i class="fas fa-trash-alt"></i></button></div></div></div>`;}gridVideos.innerHTML=h;
  }

  async function renderBoth(){await buildPhotosHTML();await buildVideosHTML()}
  function scheduleRender(){if(renderPending)return;renderPending=true;requestAnimationFrame(async ()=>{await renderBoth();renderPending=false})}

  function switchTab(filter){if(currentFilter===filter)return;currentFilter=filter;if(filter==='photos'){tabPhotos.classList.add('active');tabVideos.classList.remove('active');gridPhotos.classList.add('active');gridVideos.classList.remove('active')}else{tabVideos.classList.add('active');tabPhotos.classList.remove('active');gridVideos.classList.add('active');gridPhotos.classList.remove('active')}}
  tabPhotos.addEventListener('click',()=>switchTab('photos'));tabVideos.addEventListener('click',()=>switchTab('videos'));

  async function openMediaViewer(item){currentViewerItems=getItems(item.type==='image'?'photos':'videos');currentViewerIndex=currentViewerItems.findIndex(i=>i.id===item.id);if(currentViewerIndex===-1)currentViewerIndex=0;await updateViewerContent();mediaViewer.classList.add('active');document.body.style.overflow='hidden';}
  async function updateViewerContent(){if(!currentViewerItems.length)return;const item=currentViewerItems[currentViewerIndex];const url=await getMediaURL(item.id);viewerContent.innerHTML='';viewerTitle.textContent=item.title||'';viewerCounter.textContent=`${currentViewerIndex+1} / ${currentViewerItems.length}`;viewerPrev.style.display=currentViewerItems.length>1?'flex':'none';viewerNext.style.display=currentViewerItems.length>1?'flex':'none';if(item.type==='image')viewerContent.innerHTML=`<img src="${url}" alt="${esc(item.title)}">`;else{viewerContent.innerHTML=`<video src="${url}" controls autoplay playsinline style="max-width:100%;max-height:85vh;border-radius:0.3rem;"></video>`;currentVideoElement=viewerContent.querySelector('video')}}
  function closeMediaViewer(){if(currentVideoElement){currentVideoElement.pause();currentVideoElement=null}mediaViewer.classList.remove('active');document.body.style.overflow=''}
  function viewerPrevMedia(){if(!currentViewerItems.length)return;if(currentVideoElement){currentVideoElement.pause();currentVideoElement=null}currentViewerIndex=(currentViewerIndex-1+currentViewerItems.length)%currentViewerItems.length;updateViewerContent()}
  function viewerNextMedia(){if(!currentViewerItems.length)return;if(currentVideoElement){currentVideoElement.pause();currentVideoElement=null}currentViewerIndex=(currentViewerIndex+1)%currentViewerItems.length;updateViewerContent()}
  closeViewer.addEventListener('click',closeMediaViewer);viewerPrev.addEventListener('click',e=>{e.stopPropagation();viewerPrevMedia()});viewerNext.addEventListener('click',e=>{e.stopPropagation();viewerNextMedia()});mediaViewer.addEventListener('click',e=>{if(e.target===mediaViewer)closeMediaViewer()});
  let tsx=0;mediaViewer.addEventListener('touchstart',e=>{tsx=e.touches[0].clientX},{passive:true});mediaViewer.addEventListener('touchend',e=>{const d=e.changedTouches[0].clientX-tsx;if(Math.abs(d)>35){if(d>0)viewerPrevMedia();else viewerNextMedia();}});
  document.addEventListener('keydown',e=>{if(!mediaViewer.classList.contains('active'))return;if(e.key==='Escape')closeMediaViewer();if(e.key==='ArrowLeft')viewerPrevMedia();if(e.key==='ArrowRight')viewerNextMedia()});

  async function deleteSingleItem(itemId){const idx=mediaMeta.findIndex(m=>m.id===itemId);if(idx===-1)return;mediaMeta.splice(idx,1);saveMeta(mediaMeta);await deleteFiles(new Set([itemId]));if(urlCache.has(itemId)){URL.revokeObjectURL(urlCache.get(itemId));urlCache.delete(itemId)}const card=document.querySelector(`.media-card[data-id="${itemId}"]`);if(card){card.style.opacity='0';card.style.transform='scale(0.8)';setTimeout(()=>{if(card.parentNode)card.parentNode.removeChild(card)},150)}showToast('✅ 已删除',true);}

  function toggleSelectMode(){isSelectMode=!isSelectMode;selectedItems.clear();if(isSelectMode){batchDeleteBtn.classList.add('active');batchDeleteBtn.innerHTML='<i class="fas fa-check-square"></i> 选择中...';confirmDeleteBtn.classList.add('show');cancelSelectBtn.classList.add('show');selectAllBtn.classList.add('show')}else{batchDeleteBtn.classList.remove('active');batchDeleteBtn.innerHTML='<i class="fas fa-check-square"></i> 批量删除';confirmDeleteBtn.classList.remove('show');cancelSelectBtn.classList.remove('show');selectAllBtn.classList.remove('show')}updateCount();updateSelectAllButton();scheduleRender()}
  function cancelSelectMode(){if(!isSelectMode)return;isSelectMode=false;selectedItems.clear();batchDeleteBtn.classList.remove('active');batchDeleteBtn.innerHTML='<i class="fas fa-check-square"></i> 批量删除';confirmDeleteBtn.classList.remove('show');cancelSelectBtn.classList.remove('show');selectAllBtn.classList.remove('show');updateCount();scheduleRender()}
  function selectAllItems(){if(!isSelectMode)return;const items=getItems(currentFilter);if(selectedItems.size===items.length)selectedItems.clear();else items.forEach(i=>selectedItems.add(i.id));updateCount();updateSelectAllButton();document.querySelectorAll('.media-grid.active .media-card').forEach(c=>{const id=c.dataset.id;if(id){if(selectedItems.has(id))c.classList.add('selected');else c.classList.remove('selected')}})}
  function updateSelectAllButton(){if(!isSelectMode)return;const items=getItems(currentFilter);selectAllBtn.innerHTML=selectedItems.size===items.length&&items.length>0?'<i class="fas fa-square"></i> 取消全选':'<i class="fas fa-check-double"></i> 全选'}
  async function confirmDeleteSelected(){if(!selectedItems.size)return;const ds=new Set(selectedItems);mediaMeta=mediaMeta.filter(i=>!ds.has(i.id));saveMeta(mediaMeta);await deleteFiles(ds);for(const id of ds){if(urlCache.has(id)){URL.revokeObjectURL(urlCache.get(id));urlCache.delete(id)}}selectedItems.clear();isSelectMode=false;batchDeleteBtn.classList.remove('active');batchDeleteBtn.innerHTML='<i class="fas fa-check-square"></i> 批量删除';confirmDeleteBtn.classList.remove('show');cancelSelectBtn.classList.remove('show');selectAllBtn.classList.remove('show');updateCount();scheduleRender();showToast(`✅ 已删除 ${ds.size} 个`,true)}
  function toggleItemSelection(id){if(!isSelectMode)return;if(selectedItems.has(id))selectedItems.delete(id);else selectedItems.add(id);updateCount();updateSelectAllButton();const card=document.querySelector(`.media-card[data-id="${id}"]`);if(card){if(selectedItems.has(id))card.classList.add('selected');else card.classList.remove('selected')}}
  function updateCount(){selectedCountSpan.textContent=selectedItems.size}

  function handleGridClick(e){const t=e.target;if(t.closest('.single-delete-btn')){e.stopPropagation();e.preventDefault();const card=t.closest('.media-card');if(card&&card.dataset.id)deleteSingleItem(card.dataset.id);return}const card=t.closest('.media-card');if(!card)return;const id=card.dataset.id,item=mediaMeta.find(m=>m.id==id);if(!item)return;if(isSelectMode){if(!t.closest('button')||t.closest('.play-icon')||t.closest('video')){toggleItemSelection(id)}return}if(t.closest('.text-edit-btn')){openTextEditor(item);return}if(t.closest('.preview-btn')){openMediaViewer(item);return}if(t.closest('.play-icon')||t.closest('video')){handleVideo(card);return}if(t.closest('.media-text-below')){openTextEditor(item);return}if(t.closest('.media-container')){if(item.type==='image')openMediaViewer(item);else handleVideo(card);return}}
  gridPhotos.addEventListener('click',handleGridClick);gridVideos.addEventListener('click',handleGridClick);
  function handleVideo(card){const v=card.querySelector('video'),p=card.querySelector('.play-icon');if(!v||!p)return;if(v.paused){v.muted=false;v.play().catch(()=>{v.muted=true;v.play()});p.classList.add('playing');p.querySelector('i').className='fas fa-pause'}else{v.pause();p.classList.remove('playing');p.querySelector('i').className='fas fa-play'}}

  function openTextEditor(item){if(isSelectMode)return;currentEditItemId=item.id;mediaTextInput.value=item.text||'';textModal.classList.add('active');mediaTextInput.focus()}
  function closeTextModal(){if(currentEditItemId){const item=mediaMeta.find(m=>m.id==currentEditItemId);if(item){item.text=mediaTextInput.value;saveMeta(mediaMeta);scheduleRender()}}textModal.classList.remove('active');currentEditItemId=null}
  saveTextBtn.addEventListener('click',()=>{closeTextModal();showToast('✅ 已保存')});cancelTextBtn.addEventListener('click',()=>{textModal.classList.remove('active');currentEditItemId=null});textModal.addEventListener('click',e=>{if(e.target===textModal)closeTextModal()});document.addEventListener('keydown',e=>{if(e.key==='Escape'&&textModal.classList.contains('active'))closeTextModal()});
  batchDeleteBtn.addEventListener('click',toggleSelectMode);confirmDeleteBtn.addEventListener('click',confirmDeleteSelected);cancelSelectBtn.addEventListener('click',cancelSelectMode);selectAllBtn.addEventListener('click',selectAllItems);

  fileInput.addEventListener('change',async e=>{const files=Array.from(e.target.files);if(!files.length)return;const total=files.length;let processed=0;progressBarWrap.classList.add('show');uploadStatus.classList.add('show');progressBarFill.style.width='0%';uploadStatus.textContent=`0 / ${total}`;for(const file of files){if(!file.type.startsWith('image/')&&!file.type.startsWith('video/')&&!file.name.match(/\.(mp4|webm|ogg|mov|avi|mkv|flv|wmv|m4v|3gp|ts|mts|m2ts)$/i)){processed++;continue}const id=Date.now()+Math.random().toString(36);await saveFile(id,file);mediaMeta.push({id,type:isVideoFile(file)?'video':'image',title:file.name.replace(/\.[^/.]+$/,"").substring(0,25),text:''});saveMeta(mediaMeta);processed++;progressBarFill.style.width=Math.round((processed/total)*100)+'%';uploadStatus.textContent=`${processed} / ${total}`;await new Promise(r=>setTimeout(r,0));}progressBarWrap.classList.remove('show');uploadStatus.classList.remove('show');scheduleRender();showToast('✅ 已永久保存');fileInput.value='';});

  const navGallery=document.getElementById('navGallery'),navMessage=document.getElementById('navMessage'),navMailbox=document.getElementById('navMailbox'),pageGallery=document.getElementById('pageGallery'),pageMessage=document.getElementById('pageMessage'),pageMailbox=document.getElementById('pageMailbox');
  function switchPage(an,ap){if(isSelectMode)cancelSelectMode();[navGallery,navMessage,navMailbox].forEach(n=>n.classList.remove('active'));[pageGallery,pageMessage,pageMailbox].forEach(p=>p.classList.remove('active'));an.classList.add('active');ap.classList.add('active')}
  navGallery.addEventListener('click',()=>switchPage(navGallery,pageGallery));navMessage.addEventListener('click',()=>switchPage(navMessage,pageMessage));navMailbox.addEventListener('click',()=>switchPage(navMailbox,pageMailbox));

  const mci=document.getElementById('messageContentInput'),msb=document.getElementById('messageSubmitBtn'),ml=document.getElementById('messageList'),mc=document.getElementById('messageCount');
  function ft(){const n=new Date();return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`}
  function renderMessages(){if(!messages.length){ml.innerHTML='<div class="message-empty"><i class="fas fa-comments"></i><p>还没有留言，来说点什么吧~</p></div>';updateMsgCount();return}let h='';for(let i=0;i<messages.length;i++){const msg=messages[i],rc=msg.replies?msg.replies.length:0;h+=`<div class="message-item"><div class="message-header"><span class="message-time"><i class="far fa-clock"></i> ${msg.time}</span><div class="message-actions"><button class="message-reply-btn" data-action="r" data-index="${i}"><i class="fas fa-reply"></i> 回复${rc>0?`<span class="reply-count-badge">${rc}</span>`:''}</button><button class="message-delete-btn" data-action="dm" data-index="${i}"><i class="fas fa-times"></i></button></div></div><div class="message-content">${esc(msg.content)}</div>${renderReplies(msg,i)}</div>`}ml.innerHTML=h;updateMsgCount()}
  function renderReplies(msg,mi){if(!msg.replies||!msg.replies.length)return'';let h='';for(let ri=0;ri<msg.replies.length;ri++){const r=msg.replies[ri];h+=`<div class="reply-item"><div class="reply-header"><span class="reply-time"><i class="far fa-clock"></i> ${r.time}</span><button class="reply-delete-btn" data-action="dr" data-mi="${mi}" data-ri="${ri}"><i class="fas fa-times"></i></button></div><div class="reply-content">${esc(r.content)}</div></div>`}return h}
  ml.onclick=function(e){const a=e.target.closest('[data-action]');if(!a)return;const at=a.dataset.action;if(at==='r'){toggleReplyInput(parseInt(a.dataset.index))}else if(at==='dm'){messages.splice(parseInt(a.dataset.index),1);saveMsgs(messages);renderMessages();showToast('✅ 已删除',true)}else if(at==='dr'){const mi=parseInt(a.dataset.mi),ri=parseInt(a.dataset.ri);messages[mi].replies.splice(ri,1);saveMsgs(messages);renderMessages();showToast('✅ 已删除',true)}else if(at==='sr'){const mi=parseInt(a.dataset.mi),input=document.getElementById('ri-'+mi);if(input){const rc=input.value.trim();if(!rc){input.focus();return}if(!messages[mi].replies)messages[mi].replies=[];messages[mi].replies.push({content:rc,time:ft()});saveMsgs(messages);renderMessages();showToast('✅ 回复已保存')}}};
  function toggleReplyInput(mi){const s=ml.querySelector(`[data-mi="${mi}"]`)?.closest('.message-item')?.querySelector('.replies-section');if(!s)return;const ex=document.getElementById('ria-'+mi);if(ex){ex.remove();return}const ia=document.createElement('div');ia.className='reply-input-area';ia.id='ria-'+mi;ia.innerHTML=`<input type="text" class="reply-input" id="ri-${mi}" placeholder="输入回复..." maxlength="300"><button class="reply-send-btn" data-action="sr" data-mi="${mi}"><i class="fas fa-paper-plane"></i></button>`;s.appendChild(ia);document.getElementById('ri-'+mi).focus()}
  function updateMsgCount(){let tr=0;messages.forEach(m=>{if(m.replies)tr+=m.replies.length});mc.textContent=`共 ${messages.length} 条留言，${tr} 条回复`}
  msb.addEventListener('click',()=>{const c=mci.value.trim();if(!c){mci.focus();return}messages.unshift({content:c,time:ft(),replies:[]});saveMsgs(messages);mci.value='';renderMessages();showToast('✅ 留言已永久保存')});mci.addEventListener('keydown',e=>{if(e.key==='Enter'&&e.ctrlKey)msb.click()});

  const mbp={1:'1123',2:'lovemyselfforever',3:'1802',4:'107'};function encrypt(t,p){if(!t)return'';let r='';const k=p.split('').reduce((a,c)=>a+c.charCodeAt(0),0);for(let i=0;i<t.length;i++)r+=String.fromCharCode(t.charCodeAt(i)^(k+i)%65536);return btoa(unescape(encodeURIComponent(r)))}function decrypt(e,p){if(!e)return'';try{const d=decodeURIComponent(escape(atob(e)));const k=p.split('').reduce((a,c)=>a+c.charCodeAt(0),0);let r='';for(let i=0;i<d.length;i++)r+=String.fromCharCode(d.charCodeAt(i)^(k+i)%65536);return r}catch(e){return''}}
  const pm=document.getElementById('passwordModal'),pi=document.getElementById('passwordInput'),cpb=document.getElementById('confirmPasswordBtn'),cancb=document.getElementById('cancelPasswordBtn'),lm=document.getElementById('letterModal'),lti=document.getElementById('letterTextInput'),slb=document.getElementById('saveLetterBtn'),clb=document.getElementById('cancelLetterBtn');let cmi=null;
  function updateLD(){for(let i=1;i<=4;i++){const el=document.getElementById('letterContent'+i);if(el){el.textContent=letters[i]?'📝 信件已加密存储':'🔒 输入密码查看信件';el.classList.add('encrypted')}}}
  window.openLetter=function(id){cmi=id;pi.value='';pm.classList.add('active');pi.focus()};cpb.addEventListener('click',()=>{const e=pi.value.trim();if(e===mbp[cmi]){pm.classList.remove('active');lti.value=letters[cmi]?decrypt(letters[cmi],mbp[cmi]):'';lm.classList.add('active');lti.focus()}else alert('密码错误')});cancb.addEventListener('click',()=>pm.classList.remove('active'));pm.addEventListener('click',e=>{if(e.target===pm)pm.classList.remove('active')});slb.addEventListener('click',()=>{if(cmi){letters[cmi]=lti.value?encrypt(lti.value,mbp[cmi]):'';saveLettersData(letters);updateLD();showToast('✅ 信件已永久保存')}lm.classList.remove('active');cmi=null});clb.addEventListener('click',()=>{lm.classList.remove('active');cmi=null});lm.addEventListener('click',e=>{if(e.target===lm){lm.classList.remove('active');cmi=null}});document.addEventListener('keydown',e=>{if(e.key==='Escape'){if(pm.classList.contains('active'))pm.classList.remove('active');if(lm.classList.contains('active')){lm.classList.remove('active');cmi=null}}});

  scheduleRender();renderMessages();updateLD();
}
})();
</script>
</body>
</html>
